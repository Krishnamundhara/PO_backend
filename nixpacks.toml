# nixpacks.toml — Railway build configuration for the PO Email Backend
# Installs system packages required by Puppeteer (headless Chromium) on Linux

[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "ca-certificates",
  "ttf-dejavu"
]

[phases.install]
cmds = ["npm ci --omit=dev"]

[start]
cmd = "node server.js"
